meta:
  project: web-project
  version: "1.0.0"
  prepared_by: Generated by TestSprite

product_overview: >
  A social Laravel + Inertia.js + Vue 3 web application that lets registered users
  create posts, browse a public post feed, and manage their account settings.
  The app uses cookie-based authentication with email verification support.

core_goals:
  - Allow users to register and authenticate securely
  - Provide a shared post feed visible to all authenticated users
  - Allow users to filter the dashboard to friends' posts
  - Let users manage their profile name, email, password, and theme preference
  - Enable account deletion with password confirmation

key_features:
  - User registration with name, email, and password validation
  - Email/password login with optional remember-me and forgot-password flow
  - Dashboard post feed showing all posts ordered by newest first
  - Post creation via a textarea form on the dashboard
  - My Posts filter (friends' posts) via query param ?my-posts=true
  - Profile settings page to update name and email
  - Password settings page to change current password
  - Appearance settings to toggle light / dark / system theme
  - Account deletion from profile settings with confirmation
  - Logout from the sidebar navigation

user_flow_summary:
  - Guest visits / and sees Log in and Register links
  - Guest registers at /register with name, email, password
  - Registered user logs in at /login and lands on /dashboard
  - Authenticated user reads the post feed and submits new posts
  - Authenticated user clicks My Posts to see only friends' posts
  - Authenticated user navigates to /settings/profile to update name or email
  - Authenticated user navigates to /settings/password to change password
  - Authenticated user navigates to /settings/appearance to change theme
  - Authenticated user logs out via the sidebar

validation_criteria:
  - Registration validates name, email format, and password confirmation
  - Login rejects invalid credentials with an error message
  - Dashboard is inaccessible without authentication (redirects to /login)
  - Post creation requires a non-empty body and persists to the database
  - Profile update validates email uniqueness and name presence
  - Password update requires current password to be correct
  - Account deletion requires password confirmation before proceeding
  - Appearance changes apply immediately without a page reload

