name: Deploy to Laravel Cloud and run TestSprite

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: testsprite-deploy-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      app_url: ${{ steps.app_info.outputs.app_url }}
    steps:
      - id: app_info
        run: |
          if [ -z "${{ secrets.LARAVEL_CLOUD_URL }}" ]; then
            echo "ERROR: LARAVEL_CLOUD_URL secret is not configured." >&2
            exit 1
          fi
          APP_URL="${{ secrets.LARAVEL_CLOUD_URL }}"
          APP_URL="${APP_URL%/}"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy to Laravel Cloud
        run: |
          if [ -z "${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}" ]; then
            echo "ERROR: LARAVEL_CLOUD_DEPLOY_HOOK secret is not configured." >&2
            exit 1
          fi
          curl -fsSL -X POST "${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}?commit_hash=${{ github.sha }}"

      - name: Wait for Laravel Cloud deployment
        timeout-minutes: 8
        run: |
          echo "Esperando que Laravel Cloud responda..."
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.LARAVEL_CLOUD_URL }}" || true)
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ] || [ "$status" = "307" ] || [ "$status" = "308" ]; then
              echo "Deployment available (HTTP $status)."
              exit 0
            fi
            echo "Intento $i/24: app aún no responde (HTTP $status). Reintentando..."
            sleep 20
          done
          echo "ERROR: la app no respondió a tiempo después del deploy." >&2
          exit 1
  test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: needs.deploy.result == 'success'
    steps:
      - name: Validar secretos requeridos
        run: |
          if [ -z "${{ secrets.TESTSPRITE_API_KEY }}" ]; then
            echo "ERROR: TESTSPRITE_API_KEY no está configurado o no está disponible en este contexto."
            echo "Si el PR viene de un fork, los secrets no se exponen y TestSprite no puede ejecutarse."
            exit 1
          fi

      - uses: actions/checkout@v4
      - name: Preparar ruta requerida por TestSprite
        run: |
          mkdir -p testsprite_tests/tmp
          if [ ! -f testsprite_tests/tmp/test_results.json ]; then
            echo '[]' > testsprite_tests/tmp/test_results.json
          fi
      - name: Validar URL para TestSprite
        run: |
          if [ -z "${{ needs.deploy.outputs.app_url }}" ]; then
            echo "ERROR: needs.deploy.outputs.app_url viene vacío. Revisa el secreto LARAVEL_CLOUD_URL."
            exit 1
          fi
          echo "URL desde deploy: ${{ needs.deploy.outputs.app_url }}"

      - name: Validar suite de TestSprite (estricto)
        id: testsprite_precheck
        run: |
          if [ ! -d testsprite_tests ]; then
            echo "ERROR: Carpeta testsprite_tests no existe en el checkout del PR."
            echo "Asegúrate de que el commit incluya los archivos generados por TestSprite."
            exit 1
          fi

          TRACKED_TESTS=$(git ls-files "testsprite_tests/TC*.py")
          if [ -z "$TRACKED_TESTS" ]; then
            echo "ERROR: No se detectan archivos testsprite_tests/TC*.py en este commit."
            echo "Archivos locales encontrados:"
            ls -la testsprite_tests
            echo "Sin estos tests no se puede ejecutar TestSprite."
            exit 1
          fi

          echo "$TRACKED_TESTS" | sort | while read -r test_file; do
            echo "  - $test_file"
          done
          count=$(echo "$TRACKED_TESTS" | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "ERROR: Patron TC*.py sin archivos válidos."
            exit 1
          fi
          echo "TestSprite Pre-Check estricto OK: $count archivo(s) encontrados."

      - name: Verificar conectividad de TestSprite API
        run: |
          echo "Validando token TestSprite contra /health..."
          if ! curl -fsSL -H "Authorization: Bearer ${{ secrets.TESTSPRITE_API_KEY }}" https://api.testsprite.com/health; then
            echo "ERROR: No se pudo validar el API key de TestSprite."
            echo "Revisa que TESTSPRITE_API_KEY sea correcto y que tengas salida a api.testsprite.com."
            exit 1
          fi

      - name: TestSprite Action
        id: testsprite
        uses: TestSprite/run-action@v1
        with:
          github-token: ${{ github.token }}
          testsprite-api-key: ${{ secrets.TESTSPRITE_API_KEY }}
          base_url: ${{ needs.deploy.outputs.app_url }}
          blocking: 'true'

      - name: Resumen de resultados TestSprite
        if: always()
        run: |
          echo "total_tests=${{ steps.testsprite.outputs.total_tests || '0' }}"
          echo "passed_tests=${{ steps.testsprite.outputs.passed_tests || '0' }}"
          echo "result_url=${{ steps.testsprite.outputs.result_url || 'none' }}"

      - name: Forzar fallo si TestSprite no detecta tests
        if: always()
        run: |
          TOTAL_TESTS="${{ steps.testsprite.outputs.total_tests }}"
          if [ -z "$TOTAL_TESTS" ] || [ "$TOTAL_TESTS" = "0" ]; then
            echo "ERROR: TestSprite respondió pero no detectó casos para ejecutar (total_tests=${TOTAL_TESTS:-0})."
            echo "Esto indica problema de integración del API con la suite (no de Laravel Cloud)."
            exit 1
          fi