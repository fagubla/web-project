name: TestSprite Frontend Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  issues: write
  contents: read

jobs:
  testsprite:
    runs-on: ubuntu-latest

    env:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8765
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP & Composer ─────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── Node & assets ──────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # ── Laravel bootstrap ─────────────────────────────────────────────────
      - name: Copy .env
        run: cp .env.example .env

      - name: Set APP_URL to port 8765
        run: sed -i 's|APP_URL=.*|APP_URL=http://127.0.0.1:8765|' .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Ziggy routes
        run: php artisan ziggy:generate

      - name: Build frontend assets
        run: npm run build

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Run migrations and seed
        run: php artisan migrate --seed --force

      # ── Start Laravel server ───────────────────────────────────────────────
      - name: Start Laravel development server on port 8765
        run: php artisan serve --host=127.0.0.1 --port=8765 &
        # Wait until the server is ready before proceeding
      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8765 > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      # ── Python + Playwright ────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright pytest pytest-asyncio
          playwright install chromium --with-deps

      # ── Pre-check: verify test files exist ────────────────────────────────
      - name: TestSprite Pre-Check
        run: |
          shopt -s nullglob
          tests=(testsprite_tests/TC*.py)
          count=${#tests[@]}
          if [ "$count" -eq 0 ]; then
            echo "::error::TestSprite Pre-Check — No tests detected in testsprite_tests/. Ensure TC*.py files are committed to this branch."
            exit 1
          fi
          echo "✔ TestSprite Pre-Check — Found $count test file(s):"
          for t in "${tests[@]}"; do echo "  • $t"; done

      # ── Run TestSprite tests ───────────────────────────────────────────────
      - name: Run TestSprite frontend tests
        id: testsprite
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          cd testsprite_tests
          shopt -s nullglob
          passed=0
          failed=0
          tests=(TC*.py)
          for test in "${tests[@]}"; do
            echo "▶ Running $test"
            if python "$test"; then
              echo "✔ PASSED: $test"
              passed=$((passed + 1))
            else
              echo "✘ FAILED: $test"
              failed=$((failed + 1))
            fi
          done
          echo ""
          echo "══════════════════════════════"
          echo "  Results: $passed passed, $failed failed"
          echo "══════════════════════════════"
          echo "failed=$failed" >> $GITHUB_OUTPUT
          [ "$failed" -eq 0 ]
        with:
          testsprite-api-key: ${{ secrets.TESTSPRITE_API_KEY }}
          base_url: ${{ secrets.LARAVEL_CLOUD_URL }}
          auto-fix: true 
          create-pr: true

      # ── Create Issue on Failure ───────────────────────────────────────────
      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.testsprite.outputs.failed }}';
            const run_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ TestSprite Failure: ${failed} tests fallidos`,
              body: `### Reporte de Fallos en TestSprite\n\n` +
                    `Se detectaron **${failed}** errores en la ejecución automática.\n\n` +
                    `**Workflow:** [Ver ejecución detallada](${run_url})\n` +
                    `**Evento:** ${context.eventName} por @${context.actor}`
            });
